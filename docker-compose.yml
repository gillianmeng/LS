# 本地开发用数据库：MariaDB（与 Django 的 MySQL 驱动协议兼容，镜像相对更小）
# 启动：docker compose up -d
# 停止：docker compose down（数据在卷 mysql_data 里，不会删库）
# 内存：通过 innodb-buffer-pool 限制缓冲池，适合本机开发

services:
  db:
    image: mariadb:11
    container_name: learning_system_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: learning_db
      MARIADB_USER: learning
      MARIADB_PASSWORD: learning
      MARIADB_ROOT_PASSWORD: root
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --max-connections=100
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  mysql_data:
